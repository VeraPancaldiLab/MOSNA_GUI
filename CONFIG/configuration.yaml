save_file: True
pheno_dir: data/processed/Bram_data/phenotypes
test: False

IMC_import:
  present_in: True
  directory_path: data/processed/Bram_data/acquired_csv_files/*.csv
  path_encoding_patient: data/processed/Bram_data/alphabetical_encoding_patient_ID/IMC_patient_id_encoding.csv
  path_file_to_patient: data/processed/Bram_data/file_to_patient/IMC_file_to_patient.csv
  normalize: True
  re_index: True
  there_is_duplicata: False

  columns_to_drop: ['Unnamed: 0']
  marker_columns: "0:19 21:33"
  cell_id_columns: 20
  spatial_columns: "34:35"
  layer_columns: 

IF_import:
  present_in: True
  directory_path: data/processed/Bram_data/IF_merged_by_patient/C2/*.csv
  panel: "C2"
  path_encoding_patient: 
  path_file_to_patient: data/processed/Bram_data/file_to_patient/IF_file_to_patient.csv
  normalize: False
  re_index: False
  there_is_duplicata: True

  columns_to_drop: 
  marker_columns: "3:5"
  cell_id_columns: 0
  spatial_columns: "1:2"
  layer_columns: 7

phenograph: False

tysserand:
  IF_perform: True
  IMC_perform: True
  k_neighbors_phenograph: 30
  primary_metric_phenograph: 'minkowski'
  method_tysserand: 'delaunay'
  min_neighbors: 3

cell_encounter:
  encoded_patient_to_drop:
  encoded_patient_wanted:
  nb_cell_max_per_gaussian: 3
  gaussian_sigma: 1
  threshold_filter: 0.05

Assortativity:
  IF_perform: True
  IMC_perform: True

NAS:
  method: 'NAS'
  output_name_file: 'test'
  IMC_perform: True
  IF_perform: True

  IF:
    order: 2
    stat_funcs: [np.mean, np.std]
    stat_names: ['mean', 'std']
    clusterer_type: leiden
    reducer_type: umap
    metric: euclidean
    n_neighbors: 15
    min_dist: 0.0
    dim_clust: 2
    min_cluster_size: 10
    normalize: niche

  IMC:
    order: 2
    stat_funcs: [np.mean, np.std]
    stat_names: ['mean', 'std']
    clusterer_type: leiden
    reducer_type: umap
    metric: euclidean
    n_neighbors: 15
    min_dist: 0.0
    dim_clust: 2
    min_cluster_size: 10
    normalize: niche
