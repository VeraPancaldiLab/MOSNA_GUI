silent: false
phenograph: false
pheno_dir: data/processed/Bram_data/phenotypes
add_pheno: true
IF_import:
  present_in: true
  directory_path: data/processed/Bram_data/IF_merged_by_patient/
  panel: C1
  path_encoding_patient: null
  path_file_to_patient: data/processed/Bram_data/file_to_patient/IF_file_to_patient.csv
  columns_to_drop: null
  layer_columns: ROI_ID
  patient_columns: Patient_ID
  phenotypes:
  marker_columns: '3:5'
  cell_id_columns: 0
  spatial_columns: '1:2'
  normalize: false
  re_index: false
  there_is_duplicata: true
IMC_import:
  present_in: true
  directory_path: data/processed/Bram_data/acquired_csv_files/
  path_encoding_patient: data/processed/Bram_data/alphabetical_encoding_patient_ID/IMC_patient_id_encoding.csv
  path_file_to_patient: data/processed/Bram_data/file_to_patient/IMC_file_to_patient.csv
  columns_to_drop: 'Unnamed: 0'
  layer_columns: null
  patient_columns: null
  phenotypes:
  marker_columns: 0:19 21:33
  cell_id_columns: 20
  spatial_columns: '34:35'
  normalize: true
  re_index: true
  there_is_duplicata: false
tysserand:
  IF_perform: true
  panel: C1
  IMC_perform: false
  cpu: 20
  k_neighbors_phenograph: 30
  primary_metric_phenograph: minkowski
  method_tysserand: delaunay
  min_neighbors: 3
Assortativity:
  IF_perform: true
  panel: C1
  IMC_perform: true
  perform_batch: false
  perform_clr_transfo: false
NAS:
  method: NAS
  output_name_file: IMC_IF_Bram_PDAC_data_1
  IMC_perform: true
  IF_perform: true
  panel: C2
  node_aggregation: true
  perform_NAS_all_sample: true
  nodes_aggregation:
    IF:
      order: '1'
      stat_funcs: np.mean,np.std
      stat_names: [mean, std]
      clusterer_type: gmm
      n_clusters: 15
      reducer_type: umap
      metric: euclidean
      resolution: 0.005
      n_neighbors: 15
      min_dist: 0.0
      dim_clust: 3
      min_cluster_size: 10
      k_cluster: 15
      normalize: niche
    IMC:
      order: '2'
      stat_funcs: np.mean,np.std
      stat_names: [mean, std]
      clusterer_type: gmm
      n_clusters: 15
      reducer_type: umap
      metric: euclidean
      resolution: 0.0001
      n_neighbors: 15
      min_dist: 0.0
      dim_clust: 3
      min_cluster_size: 10
      k_cluster: 15
      normalize: niche
  IF:
    order: '1'
    stat_funcs: np.mean,np.std
    stat_names: [mean, std]
    clusterer_type: gmm
    n_clusters: 15
    reducer_type: umap
    metric: euclidean
    resolution: 0.005
    n_neighbors: 15
    min_dist: 0.1
    dim_clust: 3
    min_cluster_size: 1
    k_cluster: 15
    normalize: niche
  IMC:
    order: '2'
    stat_funcs: np.mean,np.std
    stat_names: [mean, std]
    clusterer_type: leiden
    n_clusters: null
    reducer_type: umap
    metric: euclidean
    resolution: 0.001
    n_neighbors: 15
    min_dist: 0.0
    dim_clust: 2
    min_cluster_size: 1
    k_cluster: 15
    normalize: niche