silent: false
panel_list: [C1, C2]
phenograph: false
k_neighbors_phenograph: 30
primary_metric_phenograph: minkowski
IF_normalization: false
IMC_normalization: true
tysserand:
  IF_perform: true
  panel: all
  IF_duplicata: true
  IMC_perform: false
  IMC_duplicata: false
  cpu: 20
  method_tysserand: delaunay
  min_neighbors: 3
Assortativity:
  IF_perform: false
  panel: C1
  IMC_perform: true
  perform_batch: false
  perform_clr_transfo: false
NAS:
  method: NAS
  output_name_file: IMC_IF_PDAC
  IMC_perform: false
  IF_perform: true
  panel: C2
  node_aggregation: false
  perform_NAS_all_sample: true
  nodes_aggregation:
    IF:
      order: '1'
      stat_funcs: np.mean,np.std
      stat_names: [mean, std]
      clusterer_type: gmm
      n_clusters: 15
      reducer_type: umap
      metric: euclidean
      resolution: 0.005
      n_neighbors: 15
      min_dist: 0.0
      dim_clust: 3
      min_cluster_size: 10
      k_cluster: 15
      normalize: niche
    IMC:
      order: '2'
      stat_funcs: np.mean,np.std
      stat_names: [mean, std]
      clusterer_type: gmm
      n_clusters: 8
      reducer_type: umap
      metric: euclidean
      resolution: 0.0001
      n_neighbors: 15
      min_dist: 0.0
      dim_clust: 3
      min_cluster_size: 10
      k_cluster: 15
      normalize: total
  IF:
    order: '1'
    stat_funcs: np.mean,np.std
    stat_names: [mean, std]
    clusterer_type: gmm
    n_clusters: 15
    reducer_type: umap
    metric: euclidean
    resolution: 0.005
    n_neighbors: 15
    min_dist: 0.1
    dim_clust: 3
    min_cluster_size: 1
    k_cluster: 15
    normalize: niche
  IMC:
    order: '1'
    stat_funcs: np.mean,np.std
    stat_names: [mean, std]
    clusterer_type: gmm
    n_clusters: 20
    reducer_type: umap
    metric: euclidean
    resolution: 0.001
    n_neighbors: 15
    min_dist: 0.0
    dim_clust: 2
    min_cluster_size: 1
    k_cluster: 15
    normalize: obs
