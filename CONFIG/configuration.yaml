save_file: True
pheno_dir: data/processed/Bram_data/phenotypes
test: False
phenograph: False
add_pheno: True

IMC_import:
  present_in: True
  directory_path: data/processed/Bram_data/acquired_csv_files/*.csv
  path_encoding_patient: data/processed/Bram_data/alphabetical_encoding_patient_ID/IMC_patient_id_encoding.csv
  path_file_to_patient: data/processed/Bram_data/file_to_patient/IMC_file_to_patient.csv
  normalize: True
  re_index: True
  there_is_duplicata: False

  columns_to_drop: ['Unnamed: 0']
  marker_columns: "0:19 21:33"
  cell_id_columns: 20
  spatial_columns: "34:35"
  layer_columns: 

IF_import:
  present_in: True
  directory_path: data/processed/Bram_data/IF_merged_by_patient/C2/*.csv
  panel: "C2"
  path_encoding_patient: 
  path_file_to_patient: data/processed/Bram_data/file_to_patient/IF_file_to_patient.csv
  normalize: False
  re_index: False
  there_is_duplicata: True

  columns_to_drop: 
  marker_columns: "3:5"
  cell_id_columns: 0
  spatial_columns: "1:2"
  layer_columns: 7

tysserand:
  IF_perform: True
  IMC_perform: True
  k_neighbors_phenograph: 30
  primary_metric_phenograph: 'minkowski'
  method_tysserand: 'delaunay'
  min_neighbors: 3

cell_encounter:
  encoded_patient_to_drop:
  encoded_patient_wanted:
  nb_cell_max_per_gaussian: 3
  gaussian_sigma: 1
  threshold_filter: 0.05

Assortativity:
  IF_perform: True
  IMC_perform: True
  perform_batch: False
  perform_clr_transfo: False

NAS:
  method: 'NAS'
  output_name_file: 'IMC_IF_Bram_PDAC_data'
  IMC_perform: True
  IF_perform: False
  node_aggregation: True
  perform_NAS_all_sample: False

  nodes_aggregation:
    IF:
      order: 1
      stat_funcs: [np.mean, np.std]     
      stat_names: ['mean', 'std']
      clusterer_type: leiden 
      n_clusters: # with ggm as clusterer_type only                        
      reducer_type: umap          
      metric: euclidean
      resolution: 0.0001               
      n_neighbors: 15        
      min_dist: 0.1              
      dim_clust: 2
      min_cluster_size: 0.001
      k_cluster: 15
      normalize: niche

    IMC:
      order: 2
      stat_funcs: [np.mean, np.std]     
      stat_names: ['mean', 'std']
      clusterer_type: gmm
      n_clusters: 15                        
      reducer_type: umap          
      metric: euclidean
      resolution: 0.0001              
      n_neighbors: 15              
      min_dist: 0.0              
      dim_clust: 2
      min_cluster_size: 0.001
      k_cluster: 15
      normalize: niche

  IF:
    order: 1
    stat_funcs: [np.mean, np.std]     
    stat_names: ['mean', 'std']
    clusterer_type: leiden 
    n_clusters:                       
    reducer_type: umap          
    metric: euclidean
    resolution: 0.0001             
    n_neighbors: 11               
    min_dist: 0.1              
    dim_clust: 2
    min_cluster_size: 0.001
    k_cluster: 11
    normalize: niche

  IMC:
    order: 2
    stat_funcs: [np.mean, np.std]
    stat_names: ['mean', 'std']
    clusterer_type: leiden
    n_clusters: 
    reducer_type: umap
    metric: euclidean
    resolution: 0.005
    n_neighbors: 15
    min_dist: 0.0
    dim_clust: 2
    min_cluster_size: 0.001
    k_cluster: 15
    normalize: niche

__doc__:
  NAS: |
    ¤ reducer_type : str
        DR method, can be 'umap', for now, other ones coming soon.
    ¤ n_components : int
        Number of final dimensions.
    ¤ n-neighbors : int
        Number of closest neighbors used in various DR methods.
    ¤ metric : str
        Type of distance used.
    ¤ min_dist : float
        Minimum distance between DRed data, we usually want 0.
    ¤ clusterer_type : str
        'leiden'
        'ecg' for Ensemble Clustering for Graphs, 
        'spectral' for balanced spectral clustering 
        'gmm' for Gaussian Mixture Model
        'hdbscan'
    ¤ dim_clust : int
        Dimensionality of the reducede space in which data is clustered.
        A higher number allows for more complex cluster shapes, but introduces outliers.
    ¤ k_cluster : int
        Number of neighbors considered during the clustering.
    ¤ resolution : float
        Level of details of the clustering. A higher number increases the level of details.
    ¤ n_clusters : int, None
        Number of target clusters, used with GaussianMixtureModel clusterer.
    ¤ ecg_min_weight : float, 0.05
        min_weight parameter for the ecg method.
    ¤ ecg_ensemble_size : int, 20
        ensemble_size parameter for the ecg method.
    ¤ flavor : str, None
        If 'CellCharter', uses UMAP for dimensionality reduction, and a gaussian mixture
        model for clustering. 
    ¤ avoid_neigh_overflow : bool, True
        Whether the number of neighbors for clustering is limited by the number of
        neighbors for dimensionality reduction.
          